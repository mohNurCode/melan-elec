<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Mehdi - Melan Electronics NFC Card</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f2b3d 0%, #1a3a4f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        /* NFC Card Container */
        .nfc-container {
            max-width: 480px;
            width: 100%;
            margin: 0 auto;
        }

        /* Main Card */
        .nfc-card {
            background: linear-gradient(145deg, #ffffff 0%, #f8fafc 100%);
            border-radius: 2.5rem;
            overflow: hidden;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 140, 0, 0.2);
            transition: transform 0.3s ease;
        }

        .nfc-card:hover {
            transform: translateY(-5px);
        }

        /* Card Header with Chip */
        .card-header {
            background: linear-gradient(135deg, #ff8c00, #ff6b00);
            padding: 1.8rem 1.8rem 1.2rem;
            text-align: center;
            position: relative;
        }

        .nfc-chip-icon {
            background: rgba(255, 255, 255, 0.2);
            width: 70px;
            height: 70px;
            border-radius: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 2.2rem;
            color: white;
            backdrop-filter: blur(4px);
        }

        .card-header h1 {
            color: white;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .card-header .title {
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.85rem;
            margin-top: 0.3rem;
        }

        .nfc-wave {
            position: absolute;
            bottom: -20px;
            left: 0;
            right: 0;
            height: 40px;
            background: white;
            border-radius: 50% 50% 0 0;
        }

        /* Profile Section */
        .profile-section {
            padding: 1.8rem 1.5rem 1rem;
            text-align: center;
            border-bottom: 1px solid #eef2f6;
        }

        .avatar {
            background: #fff0e0;
            width: 90px;
            height: 90px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: -3rem auto 1rem;
            font-size: 3rem;
            color: #ff8c00;
            border: 4px solid white;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        .profile-section h2 {
            font-size: 1.7rem;
            font-weight: 800;
            color: #1e2a3e;
        }

        .profile-section .badge {
            display: inline-block;
            background: #ff8c0015;
            color: #ff8c00;
            padding: 0.3rem 1rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 0.5rem;
        }

        .company {
            color: #5c6f87;
            margin-top: 0.5rem;
            font-size: 0.9rem;
        }

        /* Contact Buttons Grid */
        .contact-grid {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .contact-btn {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.2rem;
            background: #f8fafd;
            border-radius: 1.2rem;
            text-decoration: none;
            transition: all 0.25s;
            border: 1px solid #e9edf2;
        }

        .contact-btn i {
            width: 32px;
            font-size: 1.5rem;
            text-align: center;
        }

        .contact-btn .btn-info {
            flex: 1;
        }

        .contact-btn .btn-label {
            font-size: 0.75rem;
            color: #7c8ea0;
            letter-spacing: 0.3px;
        }

        .contact-btn .btn-value {
            font-weight: 700;
            color: #1e2a3e;
            font-size: 0.95rem;
        }

        .contact-btn .arrow {
            color: #ff8c00;
            font-size: 0.9rem;
            opacity: 0.6;
        }

        /* Individual button hover colors */
        .contact-btn.whatsapp:hover {
            background: #25D36610;
            border-color: #25D366;
        }
        .contact-btn.whatsapp:hover i { color: #25D366; }
        .contact-btn.email:hover {
            background: #EA433510;
            border-color: #EA4335;
        }
        .contact-btn.email:hover i { color: #EA4335; }
        .contact-btn.phone:hover {
            background: #34B7F110;
            border-color: #34B7F1;
        }
        .contact-btn.phone:hover i { color: #34B7F1; }
        .contact-btn.web:hover {
            background: #ff8c0010;
            border-color: #ff8c00;
        }
        .contact-btn.web:hover i { color: #ff8c00; }

        /* Social Links */
        .social-links {
            padding: 1rem 1.5rem 1.8rem;
            border-top: 1px solid #eef2f6;
            text-align: center;
        }

        .social-links p {
            font-size: 0.8rem;
            color: #7c8ea0;
            margin-bottom: 0.8rem;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
        }

        .social-icons a {
            width: 45px;
            height: 45px;
            background: #f0f4f9;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            color: #1e466e;
            transition: all 0.2s;
            text-decoration: none;
        }

        .social-icons a:hover {
            background: #ff8c00;
            color: white;
            transform: scale(1.1);
        }

        .tap-hint {
            text-align: center;
            padding: 1rem 1rem 1.2rem;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .tap-hint i {
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="nfc-container">
        <div class="nfc-card">
            <div class="card-header">
                <div class="nfc-chip-icon">
                    <i class="fas fa-microchip"></i>
                </div>
                <h1>Melan Electronics</h1>
                <div class="title">digital business card</div>
                <div class="nfc-wave"></div>
            </div>

            <div class="profile-section">
                <div class="avatar">
                    <i class="fas fa-id-card"></i>
                </div>
                <h2>Mehdi <i class="fas fa-check-circle" style="color:#ff8c00; font-size:1.2rem;"></i></h2>
                <div class="badge">General Manager</div>
                <div class="company"><i class="fas fa-building"></i> Melan Electronics</div>
            </div>

            <div class="contact-grid">
                <!-- WhatsApp -->
                <a href="#" class="contact-btn whatsapp" id="whatsappBtn">
                    <i class="fab fa-whatsapp" style="color:#25D366;"></i>
                    <div class="btn-info">
                        <div class="btn-label">WHATSAPP</div>
                        <div class="btn-value">+212 6 12 34 56 78</div>
                    </div>
                    <div class="arrow"><i class="fas fa-chevron-right"></i></div>
                </a>

                <!-- Email -->
                <a href="#" class="contact-btn email" id="emailBtn">
                    <i class="fas fa-envelope" style="color:#EA4335;"></i>
                    <div class="btn-info">
                        <div class="btn-label">EMAIL</div>
                        <div class="btn-value">mehdi@melan-electronics.com</div>
                    </div>
                    <div class="arrow"><i class="fas fa-chevron-right"></i></div>
                </a>

                <!-- Phone -->
                <a href="#" class="contact-btn phone" id="phoneBtn">
                    <i class="fas fa-phone-alt" style="color:#34B7F1;"></i>
                    <div class="btn-info">
                        <div class="btn-label">PHONE</div>
                        <div class="btn-value">+212 612 345 678</div>
                    </div>
                    <div class="arrow"><i class="fas fa-chevron-right"></i></div>
                </a>

                <!-- Website - Redirects to landing-page.html (display text stays melan-electronics.com) -->
                <a href="#" class="contact-btn web" id="websiteBtn">
                    <i class="fas fa-globe" style="color:#ff8c00;"></i>
                    <div class="btn-info">
                        <div class="btn-label">WEBSITE</div>
                        <div class="btn-value">melan-electronics.com</div>
                    </div>
                    <div class="arrow"><i class="fas fa-chevron-right"></i></div>
                </a>
            </div>

            <div class="social-links">
                <p><i class="fas fa-share-alt"></i> Follow Melan Electronics</p>
                <div class="social-icons">
                    <a href="#" id="igLink"><i class="fab fa-instagram"></i></a>
                    <a href="#" id="tiktokLink"><i class="fab fa-tiktok"></i></a>
                    <a href="#" id="fbLink"><i class="fab fa-facebook-f"></i></a>
                </div>
            </div>
        </div>
        <div class="tap-hint">
            <i class="fas fa-hand-pointer"></i> NFC enabled — tap your phone to save contact
            <i class="fas fa-wifi"></i>
        </div>
    </div>

    <script>
        // Contact details for Mehdi
        const contact = {
            whatsapp: "+212612345678",
            email: "mehdi@melan-electronics.com",
            phone: "+212612345678",
            // Website now redirects to local landing-page.html
            website: "landing-page.html"
        };

        const social = {
            instagram: "https://www.instagram.com/melanelectronics",
            tiktok: "https://www.tiktok.com/@melan_electronics",
            facebook: "https://www.facebook.com/melanelectronics"
        };

        // Set links
        const whatsappBtn = document.getElementById('whatsappBtn');
        const emailBtn = document.getElementById('emailBtn');
        const phoneBtn = document.getElementById('phoneBtn');
        const websiteBtn = document.getElementById('websiteBtn');

        // WhatsApp
        whatsappBtn.setAttribute('href', `https://wa.me/${contact.whatsapp.replace(/[^0-9+]/g, '')}?text=${encodeURIComponent("Hello Mehdi, I got your NFC card from Melan Electronics!")}`);
        whatsappBtn.setAttribute('target', '_blank');

        // Email
        emailBtn.setAttribute('href', `mailto:${contact.email}?subject=NFC%20Card%20-%20Mehdi&body=Hi%20Mehdi%2C%20I'd%20like%20to%20know%20more%20about%20Melan%20Electronics%20home%20appliances.`);
        
        // Phone
        phoneBtn.setAttribute('href', `tel:${contact.phone.replace(/\s/g, '')}`);
        
        // Website - redirects to landing-page.html (opens in same tab for seamless experience)
        // The displayed text remains "melan-electronics.com" but the link goes to landing-page.html
        websiteBtn.setAttribute('href', contact.website);
        // Remove target="_blank" to open in same tab (or keep '_blank' for new tab)
        // websiteBtn.setAttribute('target', '_blank');  // commented out - opens in same tab

        // Social icons
        document.getElementById('igLink').setAttribute('href', social.instagram);
        document.getElementById('igLink').setAttribute('target', '_blank');
        document.getElementById('tiktokLink').setAttribute('href', social.tiktok);
        document.getElementById('tiktokLink').setAttribute('target', '_blank');
        document.getElementById('fbLink').setAttribute('href', social.facebook);
        document.getElementById('fbLink').setAttribute('target', '_blank');
    </script>
</body>
</html>
