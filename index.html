<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Mehdi - Melan Electronics NFC Card</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: shift 20s linear infinite;
            opacity: 0.3;
        }

        @keyframes shift {
            0% { transform: translate(0, 0); }
            100% { transform: translate(40px, 40px); }
        }

        /* NFC Card Container */
        .nfc-container {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* Main Card */
        .nfc-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 3rem;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .nfc-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 40px 70px rgba(0, 0, 0, 0.4);
        }

        /* Card Header with Chip */
        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 2rem 1.5rem 1.5rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .card-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .nfc-chip-icon {
            background: rgba(255, 255, 255, 0.2);
            width: 80px;
            height: 80px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 2.5rem;
            color: white;
            backdrop-filter: blur(4px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            position: relative;
            z-index: 1;
        }

        .card-header h1 {
            color: white;
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            position: relative;
            z-index: 1;
        }

        .card-header .title {
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.85rem;
            margin-top: 0.3rem;
            position: relative;
            z-index: 1;
        }

        .nfc-wave {
            position: absolute;
            bottom: -20px;
            left: 0;
            right: 0;
            height: 40px;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 50% 50% 0 0;
            z-index: 1;
        }

        /* Profile Section */
        .profile-section {
            padding: 2rem 1.5rem 1rem;
            text-align: center;
            background: white;
        }

        .avatar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: -3rem auto 1rem;
            font-size: 3.2rem;
            color: white;
            border: 4px solid white;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
            position: relative;
            z-index: 2;
        }

        .profile-section h2 {
            font-size: 1.8rem;
            font-weight: 800;
            color: #1e293b;
            margin-top: 0.5rem;
        }

        .profile-section .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: linear-gradient(135deg, #667eea15, #764ba215);
            color: #667eea;
            padding: 0.4rem 1.2rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-top: 0.5rem;
        }

        .company {
            color: #64748b;
            margin-top: 0.5rem;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        /* Contact Buttons Grid */
        .contact-grid {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            background: white;
        }

        .contact-btn {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.2rem;
            background: #f8fafc;
            border-radius: 1.2rem;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid #e2e8f0;
            position: relative;
            overflow: hidden;
        }

        .contact-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .contact-btn:hover::before {
            left: 100%;
        }

        .contact-btn i {
            width: 36px;
            font-size: 1.6rem;
            text-align: center;
            transition: transform 0.3s;
        }

        .contact-btn:hover i {
            transform: scale(1.1);
        }

        .contact-btn .btn-info {
            flex: 1;
        }

        .contact-btn .btn-label {
            font-size: 0.7rem;
            color: #94a3b8;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .contact-btn .btn-value {
            font-weight: 700;
            color: #1e293b;
            font-size: 0.95rem;
        }

        .contact-btn .arrow {
            color: #667eea;
            font-size: 1rem;
            opacity: 0.6;
            transition: transform 0.3s;
        }

        .contact-btn:hover .arrow {
            transform: translateX(5px);
            opacity: 1;
        }

        /* Individual button hover colors */
        .contact-btn.whatsapp:hover {
            background: #25D36610;
            border-color: #25D366;
        }
        .contact-btn.whatsapp:hover i { color: #25D366; }
        .contact-btn.email:hover {
            background: #EA433510;
            border-color: #EA4335;
        }
        .contact-btn.email:hover i { color: #EA4335; }
        .contact-btn.phone:hover {
            background: #34B7F110;
            border-color: #34B7F1;
        }
        .contact-btn.phone:hover i { color: #34B7F1; }
        .contact-btn.web:hover {
            background: #667eea15;
            border-color: #667eea;
        }
        .contact-btn.web:hover i { color: #667eea; }

        /* Social Links */
        .social-links {
            padding: 1.2rem 1.5rem 1.8rem;
            border-top: 1px solid #e2e8f0;
            text-align: center;
            background: white;
        }

        .social-links p {
            font-size: 0.85rem;
            color: #64748b;
            margin-bottom: 1rem;
            font-weight: 500;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 1.2rem;
            flex-wrap: wrap;
        }

        .social-icons a {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #667eea;
            transition: all 0.3s;
            text-decoration: none;
        }

        .social-icons a:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: translateY(-5px) scale(1.1);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .tap-hint {
            text-align: center;
            padding: 1rem 1rem 1.2rem;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 50px;
            margin-top: 1rem;
            backdrop-filter: blur(10px);
        }

        .tap-hint i {
            font-size: 0.9rem;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        /* Responsive Design */
        @media (max-width: 640px) {
            body {
                padding: 0.8rem;
            }

            .nfc-container {
                max-width: 100%;
            }

            .card-header h1 {
                font-size: 1.6rem;
            }

            .nfc-chip-icon {
                width: 65px;
                height: 65px;
                font-size: 2rem;
            }

            .avatar {
                width: 85px;
                height: 85px;
                font-size: 2.8rem;
                margin-top: -2.5rem;
            }

            .profile-section h2 {
                font-size: 1.5rem;
            }

            .contact-btn {
                padding: 0.8rem 1rem;
                gap: 0.8rem;
            }

            .contact-btn i {
                width: 28px;
                font-size: 1.3rem;
            }

            .contact-btn .btn-value {
                font-size: 0.85rem;
            }

            .contact-btn .btn-label {
                font-size: 0.65rem;
            }

            .social-icons a {
                width: 42px;
                height: 42px;
                font-size: 1.3rem;
            }

            .tap-hint {
                font-size: 0.6rem;
                padding: 0.8rem;
            }
        }

        @media (max-width: 480px) {
            .contact-grid {
                padding: 1rem;
                gap: 0.8rem;
            }

            .contact-btn {
                padding: 0.7rem 0.9rem;
            }

            .contact-btn .btn-value {
                font-size: 0.8rem;
            }

            .social-links {
                padding: 1rem;
            }

            .social-icons {
                gap: 0.8rem;
            }

            .social-icons a {
                width: 38px;
                height: 38px;
                font-size: 1.2rem;
            }
        }

        /* Landscape mode */
        @media (max-width: 768px) and (orientation: landscape) {
            body {
                padding: 0.5rem;
            }

            .nfc-container {
                max-width: 450px;
            }

            .contact-grid {
                gap: 0.6rem;
            }

            .contact-btn {
                padding: 0.6rem 0.9rem;
            }
        }

        /* Touch device optimizations */
        @media (hover: none) and (pointer: coarse) {
            .contact-btn:active {
                transform: scale(0.98);
            }

            .social-icons a:active {
                transform: scale(0.95);
            }
        }

        /* Smooth scroll */
        html {
            scroll-behavior: smooth;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="nfc-container">
        <div class="nfc-card">
            <div class="card-header">
                <div class="nfc-chip-icon">
                    <i class="fas fa-microchip"></i>
                </div>
                <h1>Melan Electronics</h1>
                <div class="title">digital business card</div>
                <div class="nfc-wave"></div>
            </div>

            <div class="profile-section">
                <div class="avatar">
                    <i class="fas fa-id-card"></i>
                </div>
                <h2>Mehdi <i class="fas fa-check-circle" style="color:#667eea; font-size:1.2rem;"></i></h2>
                <div class="badge">
                    <i class="fas fa-star"></i> General Manager
                </div>
                <div class="company">
                    <i class="fas fa-building"></i> Melan Electronics
                </div>
            </div>

            <div class="contact-grid">
                <!-- WhatsApp -->
                <a href="#" class="contact-btn whatsapp" id="whatsappBtn">
                    <i class="fab fa-whatsapp" style="color:#25D366;"></i>
                    <div class="btn-info">
                        <div class="btn-label">WHATSAPP</div>
                        <div class="btn-value">+212 6 12 34 56 78</div>
                    </div>
                    <div class="arrow"><i class="fas fa-chevron-right"></i></div>
                </a>

                <!-- Email -->
                <a href="#" class="contact-btn email" id="emailBtn">
                    <i class="fas fa-envelope" style="color:#EA4335;"></i>
                    <div class="btn-info">
                        <div class="btn-label">EMAIL</div>
                        <div class="btn-value">mehdi@melan-electronics.com</div>
                    </div>
                    <div class="arrow"><i class="fas fa-chevron-right"></i></div>
                </a>

                <!-- Phone -->
                <a href="#" class="contact-btn phone" id="phoneBtn">
                    <i class="fas fa-phone-alt" style="color:#34B7F1;"></i>
                    <div class="btn-info">
                        <div class="btn-label">PHONE</div>
                        <div class="btn-value">+212 612 345 678</div>
                    </div>
                    <div class="arrow"><i class="fas fa-chevron-right"></i></div>
                </a>

                <!-- Website -->
                <a href="#" class="contact-btn web" id="websiteBtn">
                    <i class="fas fa-globe" style="color:#667eea;"></i>
                    <div class="btn-info">
                        <div class="btn-label">WEBSITE</div>
                        <div class="btn-value">melan-electronics.com</div>
                    </div>
                    <div class="arrow"><i class="fas fa-chevron-right"></i></div>
                </a>
            </div>

            <div class="social-links">
                <p><i class="fas fa-share-alt"></i> Follow Melan Electronics</p>
                <div class="social-icons">
                    <a href="#" id="igLink"><i class="fab fa-instagram"></i></a>
                    <a href="#" id="tiktokLink"><i class="fab fa-tiktok"></i></a>
                    <a href="#" id="fbLink"><i class="fab fa-facebook-f"></i></a>
                </div>
            </div>
        </div>
        <div class="tap-hint">
            <i class="fas fa-hand-pointer"></i> NFC enabled — tap your phone to save contact
            <i class="fas fa-wifi"></i>
        </div>
    </div>

    <script>
        // Contact details for Mehdi
        const contact = {
            whatsapp: "+212612345678",
            email: "mehdi@melan-electronics.com",
            phone: "+212612345678",
            website: "landing-page.html"
        };

        const social = {
            instagram: "https://www.instagram.com/melanelectronics",
            tiktok: "https://www.tiktok.com/@melan_electronics",
            facebook: "https://www.facebook.com/melanelectronics"
        };

        // Set links with error checking
        const whatsappBtn = document.getElementById('whatsappBtn');
        const emailBtn = document.getElementById('emailBtn');
        const phoneBtn = document.getElementById('phoneBtn');
        const websiteBtn = document.getElementById('websiteBtn');

        if (whatsappBtn) {
            whatsappBtn.setAttribute('href', `https://wa.me/${contact.whatsapp.replace(/[^0-9+]/g, '')}?text=${encodeURIComponent("Hello Mehdi, I got your NFC card from Melan Electronics!")}`);
            whatsappBtn.setAttribute('target', '_blank');
        }

        if (emailBtn) {
            emailBtn.setAttribute('href', `mailto:${contact.email}?subject=NFC%20Card%20-%20Mehdi&body=Hi%20Mehdi%2C%20I'd%20like%20to%20know%20more%20about%20Melan%20Electronics%20home%20appliances.`);
        }
        
        if (phoneBtn) {
            phoneBtn.setAttribute('href', `tel:${contact.phone.replace(/\s/g, '')}`);
        }
        
        if (websiteBtn) {
            websiteBtn.setAttribute('href', contact.website);
        }

        // Social icons
        const igLink = document.getElementById('igLink');
        const tiktokLink = document.getElementById('tiktokLink');
        const fbLink = document.getElementById('fbLink');

        if (igLink) {
            igLink.setAttribute('href', social.instagram);
            igLink.setAttribute('target', '_blank');
        }
        if (tiktokLink) {
            tiktokLink.setAttribute('href', social.tiktok);
            tiktokLink.setAttribute('target', '_blank');
        }
        if (fbLink) {
            fbLink.setAttribute('href', social.facebook);
            fbLink.setAttribute('target', '_blank');
        }
    </script>
</body>
</html>gi
